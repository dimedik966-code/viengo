<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

#vcTildaOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.55);
  z-index: 999999;
  align-items: center;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}
#vcTildaOverlay.open { display: flex; }

#vcTildaModal {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px 32px;
  width: 100%;
  max-width: 440px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  font-family: 'Manrope', sans-serif;
  animation: vcIn 0.22s cubic-bezier(.4,0,.2,1);
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes vcIn {
  from { opacity: 0; transform: scale(0.94) translateY(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

#vcTildaClose {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  font-size: 22px; color: #aaa;
  cursor: pointer; padding: 6px;
  border-radius: 50%;
  line-height: 1;
  font-family: sans-serif;
}
#vcTildaClose:hover { color: #333; background: #f5f5f5; }

.vct-title {
  font-size: 20px; font-weight: 800;
  color: #1a1a1a; margin-bottom: 6px;
  font-family: 'Manrope', sans-serif;
}
.vct-subtitle {
  font-size: 13.5px; color: #999;
  margin-bottom: 24px; line-height: 1.4;
  font-family: 'Manrope', sans-serif;
}
.vct-label {
  display: block; font-size: 12px;
  font-weight: 600; color: #666;
  margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
  font-family: 'Manrope', sans-serif;
}
.vct-input {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid #ddd; border-radius: 12px;
  font-family: 'Manrope', sans-serif;
  font-size: 15px; font-weight: 500;
  color: #1a1a1a; margin-bottom: 14px;
  background: #fafafa;
  outline: none; box-sizing: border-box;
  transition: border-color 0.18s;
}
.vct-input:focus { border-color: #4a7c3f; background: #fff; }
.vct-input::placeholder { color: #bbb; font-weight: 400; }

.vct-or {
  text-align: center; font-size: 12px;
  color: #bbb; margin: -4px 0 14px;
  font-family: 'Manrope', sans-serif;
}
#vcTildaError {
  display: none; color: #c0392b;
  font-size: 13px; margin-bottom: 10px;
  font-family: 'Manrope', sans-serif;
}
.vct-btn {
  width: 100%; padding: 15px;
  background: #c5b876; color: #2a2000;
  font-family: 'Manrope', sans-serif;
  font-size: 15px; font-weight: 700;
  border: none; border-radius: 50px;
  cursor: pointer; margin-top: 6px;
  transition: background 0.18s;
}
.vct-btn:hover { background: #b5a862; }
.vct-btn:disabled { opacity: 0.6; cursor: not-allowed; }

#vcTildaSuccess {
  display: none; text-align: center;
  padding: 20px 0 10px;
}
.vct-ok-icon {
  width: 56px; height: 56px;
  background: #4a7c3f; border-radius: 50%;
  display: flex; align-items: center;
  justify-content: center; margin: 0 auto 16px;
}
.vct-ok-title {
  font-size: 18px; font-weight: 800;
  color: #1a1a1a; margin-bottom: 8px;
  font-family: 'Manrope', sans-serif;
}
.vct-ok-text {
  font-size: 14px; color: #777;
  line-height: 1.5;
  font-family: 'Manrope', sans-serif;
}
</style>

<div id="vcTildaOverlay">
  <div id="vcTildaModal">
    <button id="vcTildaClose" onclick="vcTClose()">&#x2715;</button>

    <div id="vcTildaForm">
      <div class="vct-title">Оформить карту</div>
      <div class="vct-subtitle">Оставьте контакт — наш менеджер свяжется с вами и поможет с оформлением</div>

      <label class="vct-label">Ваше имя</label>
      <input class="vct-input" id="vcTName" type="text" placeholder="Иван Иванов" autocomplete="name">

      <label class="vct-label">Номер телефона</label>
      <input class="vct-input" id="vcTPhone" type="tel" placeholder="+7 900 000 00 00" autocomplete="tel">

      <div class="vct-or">— или —</div>

      <label class="vct-label">Ник в Telegram</label>
      <input class="vct-input" id="vcTTg" type="text" placeholder="@username">

      <div id="vcTildaError"></div>

      <button class="vct-btn" id="vcTildaSubmit" onclick="vcTSubmit()">Отправить заявку</button>
    </div>

    <div id="vcTildaSuccess">
      <div class="vct-ok-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="vct-ok-title">Заявка принята!</div>
      <div class="vct-ok-text">Наш менеджер свяжется с вами<br>в ближайшее время.</div>
    </div>
  </div>
</div>

<script>
var vcTCurrentCard = '';

// Слушаем postMessage от iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'vcOpenModal') {
    vcTCurrentCard = e.data.card || '';
    vcTOpen();
  }
});

function vcTOpen() {
  document.getElementById('vcTName').value = '';
  document.getElementById('vcTPhone').value = '';
  document.getElementById('vcTTg').value = '';
  document.getElementById('vcTildaError').style.display = 'none';
  document.getElementById('vcTildaForm').style.display = '';
  document.getElementById('vcTildaSuccess').style.display = 'none';
  document.getElementById('vcTildaSubmit').disabled = false;
  document.getElementById('vcTildaSubmit').textContent = 'Отправить заявку';
  document.getElementById('vcTildaOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.getElementById('vcTName').focus(); }, 150);
}

function vcTClose() {
  document.getElementById('vcTildaOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Закрытие по клику на фон
document.getElementById('vcTildaOverlay').addEventListener('click', function(e) {
  if (e.target === this) vcTClose();
});

// Закрытие по Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') vcTClose();
});

function vcTSubmit() {
  var name  = document.getElementById('vcTName').value.trim();
  var phone = document.getElementById('vcTPhone').value.trim();
  var tg    = document.getElementById('vcTTg').value.trim();
  var err   = document.getElementById('vcTildaError');

  if (!name) {
    err.textContent = 'Пожалуйста, укажите ваше имя';
    err.style.display = 'block';
    document.getElementById('vcTName').focus();
    return;
  }
  if (!phone && !tg) {
    err.textContent = 'Укажите номер телефона или ник в Telegram';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  var btn = document.getElementById('vcTildaSubmit');
  btn.disabled = true;
  btn.textContent = 'Отправляем...';

  var contact = phone ? ('📞 ' + phone) : '';
  if (tg) contact += (contact ? '\n' : '') + '✈️ Telegram: ' + tg;
  var card = vcTCurrentCard ? ('\n🏦 Карта: ' + vcTCurrentCard) : '';
  var msg = '🆕 Новая заявка с сайта viengo.ru\n'
          + '👤 Имя: ' + name + '\n'
          + contact + card;

  var BOT  = '8050108442:AAEJR3h2zQ9Z-Hzf1BOaY7Gthd8qdn7eomg';
  var CHAT = '213311548';

  fetch('https://api.telegram.org/bot' + BOT + '/sendMessage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHAT, text: msg })
  })
  .then(function() {
    document.getElementById('vcTildaForm').style.display = 'none';
    document.getElementById('vcTildaSuccess').style.display = 'block';
    setTimeout(vcTClose, 3000);
  })
  .catch(function() {
    document.getElementById('vcTildaForm').style.display = 'none';
    document.getElementById('vcTildaSuccess').style.display = 'block';
    setTimeout(vcTClose, 3000);
  });
}
</script>
